# Docker Compose - Development Environment
# Hot reload enabled, debug mode, ports exposed

version: '3.8'

services:
  # Redis - Message broker & cache
  redis:
    image: redis:7.2-alpine
    container_name: sujbot2_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sujbot2_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sujbot2_backend_dev
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models/transformers
      - SENTENCE_TRANSFORMERS_HOME=/app/models/sentence-transformers
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./backend:/app  # Hot reload
      - uploads_dev:/app/uploads
      - indexes_dev:/app/indexes
      - ./backend/logs:/app/logs
      - model_cache:/app/models
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sujbot2_network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sujbot2_celery_dev
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models/transformers
      - SENTENCE_TRANSFORMERS_HOME=/app/models/sentence-transformers
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./backend:/app
      - uploads_dev:/app/uploads
      - indexes_dev:/app/indexes
      - ./backend/logs:/app/logs
      - model_cache:/app/models
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    depends_on:
      - redis
    networks:
      - sujbot2_network
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1 --max-tasks-per-child=1

  # Celery Flower (monitoring)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sujbot2_flower_dev
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - FLOWER_UNAUTHENTICATED_API=true
      - FLOWER_BASIC_AUTH=admin:admin123
    depends_on:
      - redis
      - celery_worker
    networks:
      - sujbot2_network
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sujbot2_frontend_dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent node_modules from being overwritten
    networks:
      - sujbot2_network
    restart: unless-stopped

volumes:
  redis_data_dev:
    driver: local
  uploads_dev:
    driver: local
  indexes_dev:
    driver: local
  model_cache:
    driver: local

networks:
  sujbot2_network:
    driver: bridge
